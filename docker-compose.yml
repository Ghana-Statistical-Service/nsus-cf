services:
  web:
    image: ghcr.io/ghana-statistical-service/nsus-cf:latest
    container_name: nsus-cf
    restart: unless-stopped
    ports:
      # nginx on the host terminates TLS for nsuscf.statsghana.gov.gh
      # and proxies to this port; the app must not bind 80/443 itself.
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
